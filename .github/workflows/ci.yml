name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-tests:
    name: API tests (no LLM)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start server
        run: node dist/index.js &
        env:
          PORT: 3033

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3033/api/agent-info && break
            sleep 1
          done

      - name: Run API tests
        run: npm run test:api
        env:
          TEST_BASE_URL: http://localhost:3033
