<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Design System MCP favicon">
  <defs>
    <style>
      .bg-grid { fill: none; stroke: #333; stroke-width: 0.5; stroke-dasharray: 1,1; }
      .arch-stroke { fill: none; stroke: #21409a; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; }
      .module-blue { fill: #9ac6ea; stroke: #21409a; stroke-width: 1.2; stroke-linejoin: miter; }
      .module-white { fill: #fff; stroke: #000; stroke-width: 1.2; stroke-linejoin: miter; }
      .accent-dark { fill: #000; }
      .symbol-white { fill: #fff; }
    </style>
  </defs>
  <g id="Grid">
    <path class="bg-grid" d="M0 4h24M0 8h24M0 12h24M0 16h24M0 20h24M4 0v24M8 0v24M12 0v24M16 0v24M20 0v24"/>
  </g>
  <path class="arch-stroke" d="M8 8v8h6"/>
  <g id="SquareModule" transform="translate(5, 5)">
    <rect class="module-blue" width="6" height="6">
      <animate attributeName="stroke-width" values="1.2;1.6;1.2" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect class="accent-dark" x="1.5" y="1.5" width="3" height="3">
      <animate attributeName="x" values="1.5;1.35;1.5" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="1.5;1.35;1.5" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="width" values="3;3.3;3" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="height" values="3;3.3;3" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect class="symbol-white" x="2.2" y="2.2" width="1.6" height="1.6">
      <animate attributeName="x" values="2.2;2.05;2.2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="2.2;2.05;2.2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="width" values="1.6;1.9;1.6" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="height" values="1.6;1.9;1.6" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g id="RectModule" transform="translate(14, 13.5)">
    <rect class="module-blue" width="7" height="5"/>
    <path fill="none" stroke="#fff" stroke-width="1" d="M1.5 1.5v2M5.5 1.5v2M1.5 2.5h4"/>
  </g>
  <g id="ArchitecturalEmblem" transform="translate(17.5, 11)">
    <rect class="module-white" x="-2.5" y="-2.5" width="5" height="5"/>
    <path class="arch-stroke" d="M-1.5 0h3M0 -1.5v3" stroke-width="0.8"/>
  </g>
</svg>
